<script>
    // --- 1. ANIMAÇÃO DE REVELAR/FECHAR O CARD ---
    function toggleCard(card) {
        card.classList.toggle('ativo');
        
        const botao = card.querySelector('.btn-revelar');
        if (card.classList.contains('ativo')) {
            botao.textContent = 'Fechar';
            // Pequeno efeito vibratório no botão ao abrir (estilo sentido aranha)
            botao.style.transform = 'scale(1.1)';
            setTimeout(() => botao.style.transform = 'scale(1)', 150);
        } else {
            botao.textContent = 'Ver';
        }
    }

    // --- 2. EFEITO DE DIGITAÇÃO (INTRODUÇÃO) ---
    function efeitoDigitacao() {
        const elementoIntro = document.querySelector('.introducao p');
        const textoOriginal = elementoIntro.innerHTML;
        elementoIntro.innerHTML = ''; // Limpa o texto inicial
        
        let i = 0;
        // Velocidade da digitação em milissegundos
        const velocidade = 15; 

        function digitar() {
            if (i < textoOriginal.length) {
                // Se encontrar uma tag HTML (como <br>), avança até o final dela para não quebrar o layout
                if (textoOriginal.charAt(i) === '<') {
                    i = textoOriginal.indexOf('>', i) + 1;
                } else {
                    i++;
                }
                elementoIntro.innerHTML = textoOriginal.substring(0, i);
                setTimeout(digitar, velocidade);
            }
        }
        digitar();
    }

    // --- 3. ANIMAÇÃO AO ROLAR A PÁGINA (SCROLL REVEAL) ---
    function animarScroll() {
        const cards = document.querySelectorAll('.card');
        
        // Configura o observador para detectar quando o card aparece na tela
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry, index) => {
                if (entry.isIntersecting) {
                    // Adiciona um pequeno atraso (delay) baseado na posição do card para um efeito cascata
                    setTimeout(() => {
                        entry.target.style.opacity = '1';
                        entry.target.style.transform = 'translateY(0) scale(1)';
                    }, index * 150); // 150ms de diferença entre cada card
                    
                    observer.unobserve(entry.target); // Para de observar após animar
                }
            });
        }, {
            threshold: 0.1 // Ativa quando 10% do card estiver visível
        });

        // Configuração inicial dos cards antes de serem animados
        cards.forEach((card) => {
            card.style.opacity = '0';
            card.style.transform = 'translateY(40px) scale(0.95)';
            card.style.transition = 'opacity 0.6s ease, transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            observer.observe(card);
        });
    }

    // --- INICIALIZAÇÃO DAS ANIMAÇÕES ---
    window.addEventListener('DOMContentLoaded', () => {
        efeitoDigitacao();
        animarScroll();
    });
</script>
